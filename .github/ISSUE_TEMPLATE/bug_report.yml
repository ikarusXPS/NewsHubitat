name: Bug Report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Before submitting:

        - **Security issues** — do NOT use this form. Use [Security Advisories](https://github.com/ikarusXPS/NewsHubitat/security/advisories/new) instead.
        - **Questions / discussion** — please use Discussions, not Issues.
        - Search [existing issues](https://github.com/ikarusXPS/NewsHubitat/issues?q=is%3Aissue) first to avoid duplicates.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I click X on page Y, I expected Z but got W instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps. The shorter, the faster we can fix it.
      placeholder: |
        1. Go to /...
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      multiple: false
      options:
        - Web (apps/web)
        - Mobile iOS (apps/mobile)
        - Mobile Android (apps/mobile)
        - Public API (/api/v1/public/*)
        - Backend / Server (apps/web/server)
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Mobile OS version
      description: e.g. Chrome 130 / Firefox 134 / Safari 17.6 / iOS 18.2 / Android 15
      placeholder: Chrome 130 on macOS 14
    validations:
      required: false

  - type: dropdown
    id: language
    attributes:
      label: UI language
      options:
        - German (DE)
        - English (EN)
        - French (FR)
        - Other / Mixed
      default: 1
    validations:
      required: false

  - type: dropdown
    id: tier
    attributes:
      label: Subscription tier (if relevant)
      options:
        - Not signed in
        - FREE
        - PREMIUM
        - ENTERPRISE
        - Not relevant
      default: 4
    validations:
      required: false

  - type: textarea
    id: console-errors
    attributes:
      label: Browser console / server logs
      description: Paste any relevant console errors, network failures, or server logs. Use code blocks.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / video
      description: If applicable, drag images or video here to help explain the problem.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: This is a bug, not a security vulnerability (security issues go to Security Advisories)
          required: true
