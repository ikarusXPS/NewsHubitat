# Prometheus configuration for NewsHub monitoring
# See: .planning/phases/20-monitoring-alerting/20-CONTEXT.md

global:
  scrape_interval: 15s      # D-16: 15-second scrape interval
  evaluation_interval: 15s  # D-20: 15-second alert evaluation

rule_files:
  - 'alert.rules.yml'       # D-17: Alert rules in separate file

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'newshub'
    # Phase 37 / DEPLOY-02: Swarm DNS-SD — `tasks.app` resolves to all 4 replica IPs.
    # Local dev fallback (under `docker compose up`, not `docker stack deploy`):
    #   replace dns_sd_configs with `static_configs: [{ targets: ['app:3001'] }]`
    dns_sd_configs:
      - names: ['tasks.app']
        type: A
        port: 3001
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Phase 37 / JOB-01: app-worker singleton.
  # TODO: worker currently has no HTTP listener — see RESEARCH §Open Question 1.
  # Uncomment once the worker exposes a /metrics endpoint on :3002.
  # - job_name: 'newshub-worker'
  #   static_configs:
  #     - targets: ['app-worker:3002']
  #   metrics_path: '/metrics'
  #   scrape_interval: 15s

  # Phase 37 / DB-04: PgBouncer pool observability via prometheuscommunity exporter.
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer-exporter:9127']
    metrics_path: '/metrics'
    scrape_interval: 15s
