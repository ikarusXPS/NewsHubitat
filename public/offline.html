<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsHub - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0e1a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 600px;
      background: rgba(10, 14, 26, 0.95);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 0.5rem;
      padding: 2rem;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
    }

    .icon {
      font-size: 4rem;
      color: #ff0044;
      margin-bottom: 1rem;
    }

    h1 {
      color: #00f0ff;
      font-size: 2rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .button {
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid rgba(0, 240, 255, 0.4);
      color: #00f0ff;
      padding: 0.75rem 1.5rem;
      border-radius: 0.375rem;
      font-family: inherit;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      margin: 0.5rem;
      text-decoration: none;
      display: inline-block;
    }

    .button:hover {
      background: rgba(0, 240, 255, 0.2);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    .cache-count {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚠</div>
    <h1>You're Offline</h1>
    <p>
      Your internet connection is unavailable. Some features may not work properly.
      You can still view cached articles from previous sessions.
    </p>
    <button class="button" onclick="window.location.reload()">Retry Connection</button>
    <button class="button" onclick="window.location.href='/'">View Cached Articles</button>
    <div class="cache-count" id="cache-info">Checking cache...</div>
  </div>

  <script>
    // Show cached article count
    if ('caches' in window) {
      caches.open('api-cache').then(cache => {
        cache.keys().then(keys => {
          const count = keys.filter(req => req.url.includes('/api/news')).length;
          document.getElementById('cache-info').textContent =
            count > 0 ? `${count} articles available offline` : 'No cached articles';
        });
      });
    }
  </script>
</body>
</html>
